spring:
  application.name: exammate-backend
  config:
    import: optional:file:.env[.properties]
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl.enable: true
          starttls.enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  servlet:
    context-path: /api/v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs


app.allowed-origin:
  hosted: ${HOSTED_FRONTEND_URL}
  local: ${LOCAL_HOST_FRONTEND_URL}

jwt:
  secret: ${JWT_SECRET:yyU0AdqdxwdENHux5OoQ8Pg9kYddnXm16fOxTPMHsqU=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
